<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Maison Café</title>
  <link rel="icon" type="image/png" href="images/cafe.favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="index.html">Maison Café</a>
      <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="locations.html">Locations</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a class="active" href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-main container reveal">
    <h1 class="page-title">Contact</h1>
    <div class="split contact-split">
      <div class="location-card">
        <h2>Sliubar</h2>
        <p>Email: <a href="mailto:hello@sliubar.com">hello@sliubar.com</a></p>
        <p>Website: <a href="https://sliubar.com" target="_blank" rel="noopener">https://sliubar.com</a></p>
      </div>

      <form class="contact-form" action="#" method="post">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button class="btn" type="submit">Send Message</button>
      </form>
    </div>
  </main>

  <footer class="footer"><div class="container"><h3>Maison Café</h3><p>Artisan Coffee &amp; Brunch</p><p>© 2026 Maison Café</p><p>Built by Sliubar</p></div></footer>
  <script src="js/script.js"></script>
</body>
</html>
